version: '3.8'

services:
  git-server:
    image: gitea/gitea:latest
    container_name: git-server
    ports:
      - "3000:3000"
      - "2222:22" # Changed host port to 2222 to avoid conflict with your actual host SSH
    volumes:
      - ./data:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__database__DB_TYPE=sqlite3 # Defaulting to SQLite for a simple setup
    restart: always
    networks:
      - git-network

  reverse-proxy:
    image: nginx:latest
    container_name: reverse-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - git-server
    restart: always
    networks:
      - git-network

networks:
  git-network:
    driver: bridge